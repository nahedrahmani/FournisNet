version: '3.9'

services:

  # ── MySQL ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: fournisnet-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: DB_FourniNet
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot backend ───────────────────────────────────
  backend:
    build:
      context: ./FournisNet
      dockerfile: Dockerfile
    container_name: fournisnet-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/DB_FourniNet?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8083
    ports:
      - "8083:8083"

  # ── Angular frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./FournisNetFE
      dockerfile: Dockerfile
    container_name: fournisnet-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
