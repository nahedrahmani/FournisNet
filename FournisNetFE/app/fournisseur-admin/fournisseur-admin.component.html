<section class="ftco-section bg-light">
  <div class="container">

    <div class="row justify-content-center mb-5">
      <div class="col-md-12 heading-section text-center">
        <span class="subheading">Administration</span>
        <h2 class="mb-2">Gestion des Fournisseurs</h2>
      </div>
    </div>

    <!-- Error Banner -->
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible" role="alert">
      {{ errorMessage }}
      <button type="button" class="btn-close" (click)="errorMessage = null"></button>
    </div>

    <!-- Delete Confirmation -->
    <div *ngIf="deletePending != null" class="alert alert-warning d-flex align-items-center gap-3" role="alert">
      <span>Voulez-vous vraiment supprimer ce fournisseur ?</span>
      <button class="btn btn-danger btn-sm" (click)="confirmDelete()">Confirmer</button>
      <button class="btn btn-secondary btn-sm" (click)="cancelDelete()">Annuler</button>
    </div>

    <!-- Add Form -->
    <div class="card p-4 mb-5 shadow-sm rounded">
      <h4 class="mb-4 text-center">Ajouter un fournisseur</h4>
      <div class="row g-3">
        <div class="col-md-3">
          <input type="text" class="form-control" placeholder="Nom *"
                 [(ngModel)]="newFournisseur.nom" name="nom">
        </div>
        <div class="col-md-2">
          <select class="form-control" [(ngModel)]="newFournisseur.type" name="type">
            <option value="FABRIQUANT_ORIGINE">Fabriquant d'origine</option>
            <option value="SOUS_TRAITANT">Sous-traitant</option>
            <option value="DISTRIBUTEUR">Distributeur</option>
          </select>
        </div>
        <div class="col-md-2">
          <input type="email" class="form-control" placeholder="Email"
                 [(ngModel)]="newFournisseur.email" name="email">
        </div>
        <div class="col-md-2">
          <input type="text" class="form-control" placeholder="Adresse"
                 [(ngModel)]="newFournisseur.adresse" name="adresse">
        </div>
        <div class="col-md-2">
          <input type="text" class="form-control" placeholder="Téléphone"
                 [(ngModel)]="newFournisseur.telephone" name="telephone">
        </div>
        <div class="col-md-1 d-flex align-items-center">
          <button class="btn btn-primary w-100" (click)="add()">Ajouter</button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-responsive shadow-sm rounded">
      <table class="table table-striped table-hover mb-0">
        <thead >
          <tr>
            <th>Nom</th>
            <th>Type</th>
            <th>Email</th>
            <th>Adresse</th>
            <th>Téléphone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let f of fournisseurs">

            <!-- Normal row -->
            <ng-container *ngIf="!editingFournisseur || editingFournisseur.id !== f.id">
              <td>{{ f.nom }}</td>
              <td>{{ f.type }}</td>
              <td>{{ f.email }}</td>
              <td>{{ f.adresse }}</td>
              <td>{{ f.telephone }}</td>
              <td>
                <button class="btn btn-warning btn-sm me-2" (click)="startEdit(f)">Modifier</button>
                <button class="btn btn-danger btn-sm" (click)="remove(f.id ?? 0)">Supprimer</button>
              </td>
            </ng-container>

            <!-- Edit row -->
            <ng-container *ngIf="editingFournisseur && editingFournisseur.id === f.id">
              <td><input type="text" class="form-control form-control-sm" [(ngModel)]="editingFournisseur.nom"></td>
              <td>
                <select class="form-control form-control-sm" [(ngModel)]="editingFournisseur.type">
                  <option value="FABRIQUANT_ORIGINE">Fabriquant d'origine</option>
                  <option value="SOUS_TRAITANT">Sous-traitant</option>
                  <option value="DISTRIBUTEUR">Distributeur</option>
                </select>
              </td>
              <td><input type="email" class="form-control form-control-sm" [(ngModel)]="editingFournisseur.email"></td>
              <td><input type="text" class="form-control form-control-sm" [(ngModel)]="editingFournisseur.adresse"></td>
              <td><input type="text" class="form-control form-control-sm" [(ngModel)]="editingFournisseur.telephone"></td>
              <td>
                <button class="btn btn-success btn-sm me-2" (click)="saveEdit()">Enregistrer</button>
                <button class="btn btn-secondary btn-sm" (click)="cancelEdit()">Annuler</button>
              </td>
            </ng-container>

          </tr>
          <tr *ngIf="fournisseurs.length === 0">
            <td colspan="6" class="text-center text-muted py-4">Aucun fournisseur enregistré.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</section>
