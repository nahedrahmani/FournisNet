<div class="tree-container">
  <div class="tree-header">
    <h2>Arborescence des Fournisseurs</h2>
    <button class="reload-btn" (click)="loadTree()">↻ Actualiser</button>
  </div>

  <div *ngIf="loading" class="state-message">Chargement...</div>

  <div *ngIf="errorMessage" class="error-banner">
    {{ errorMessage }}
    <button (click)="loadTree()">Réessayer</button>
  </div>

  <div *ngIf="!loading && !errorMessage && tree.length === 0" class="state-message">
    Aucun fournisseur trouvé. Commencez par en ajouter un.
  </div>

  <ul *ngIf="!loading && tree.length > 0" class="root-list">
    <li *ngFor="let node of tree">
      <app-admin-node [node]="node"></app-admin-node>
    </li>
  </ul>
</div>
